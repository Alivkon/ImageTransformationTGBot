# HTTP: только для certbot challenge, всё остальное → HTTPS
server {
    listen 80;
    server_name imagetransformation.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name imagetransformation.ru;

    ssl_certificate     /etc/letsencrypt/live/imagetransformation.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/imagetransformation.ru/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /pay {
        proxy_pass         http://bot:8080/pay;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass         http://bot:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /yookassa/ {
        proxy_pass         http://bot:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
