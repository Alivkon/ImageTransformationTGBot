<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пополнение баланса</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://yookassa.ru/checkout-widget/v1/checkout-widget.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 24px;
        }

        .amounts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 24px;
        }

        .amount-btn {
            padding: 14px;
            border-radius: 12px;
            border: 2px solid var(--tg-theme-hint-color, #ddd);
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .amount-btn.selected {
            border-color: var(--tg-theme-button-color, #0088cc);
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
        }

        .pay-btn {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .pay-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        #payment-form {
            width: 100%;
            max-width: 400px;
        }

        .error {
            color: #e53935;
            font-size: 14px;
            margin-top: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>💳 Пополнение баланса</h1>
    <p class="subtitle">Выберите сумму</p>

    <div class="amounts" id="amounts"></div>

    <button class="pay-btn" id="payBtn" disabled>Выберите сумму</button>

    <div id="payment-form"></div>
    <p class="error" id="errorMsg"></p>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const AMOUNTS = [100, 500, 1000, 2000];
        let selectedAmount = null;
        let widget = null;

        const amountsEl = document.getElementById("amounts");
        const payBtn = document.getElementById("payBtn");
        const errorMsg = document.getElementById("errorMsg");

        AMOUNTS.forEach(amount => {
            const btn = document.createElement("button");
            btn.className = "amount-btn";
            btn.textContent = amount + " ₽";
            btn.dataset.amount = amount;
            btn.addEventListener("click", () => selectAmount(amount));
            amountsEl.appendChild(btn);
        });

        function selectAmount(amount) {
            selectedAmount = amount;
            document.querySelectorAll(".amount-btn").forEach(b => {
                b.classList.toggle("selected", parseInt(b.dataset.amount) === amount);
            });
            payBtn.textContent = `Оплатить ${amount} ₽`;
            payBtn.disabled = false;

            if (widget) {
                widget.destroy();
                widget = null;
                document.getElementById("payment-form").innerHTML = "";
            }
        }

        payBtn.addEventListener("click", async () => {
            if (!selectedAmount) return;
            payBtn.disabled = true;
            payBtn.textContent = "Создаём платёж...";
            errorMsg.textContent = "";

            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) {
                errorMsg.textContent = "Откройте страницу через Telegram.";
                payBtn.disabled = false;
                payBtn.textContent = `Оплатить ${selectedAmount} ₽`;
                return;
            }

            try {
                const res = await fetch("/api/payment/create", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: userId, amount: selectedAmount }),
                });

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.error || `Ошибка сервера: ${res.status}`);
                }

                const { confirmation_token } = await res.json();

                widget = new YooMoneyCheckoutWidget({
                    confirmation_token,
                    return_url: window.location.href,
                    customization: {
                        colors: {
                            controlPrimary: tg.themeParams.button_color || "#0088cc",
                        },
                    },
                    error_callback: (err) => {
                        console.error("YooKassa widget error:", err);
                        errorMsg.textContent = "Ошибка виджета оплаты.";
                    },
                });

                widget.render("payment-form");

                widget.on("success", () => {
                    payBtn.textContent = "✅ Оплата прошла!";
                    setTimeout(() => tg.close(), 3000);
                });

                widget.on("fail", () => {
                    errorMsg.textContent = "Платёж не прошёл. Попробуйте ещё раз.";
                    payBtn.disabled = false;
                    payBtn.textContent = `Оплатить ${selectedAmount} ₽`;
                });

            } catch (e) {
                errorMsg.textContent = e.message || "Произошла ошибка.";
                payBtn.disabled = false;
                payBtn.textContent = `Оплатить ${selectedAmount} ₽`;
            }
        });
    </script>
</body>
</html>
